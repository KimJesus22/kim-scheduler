services:
  mariadb:
    image: mariadb:11.4
    container_name: kim_scheduler_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_password_dev
      MARIADB_DATABASE: kim_scheduler_db
      MARIADB_USER: kim_scheduler_user
      MARIADB_PASSWORD: kim_scheduler_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
